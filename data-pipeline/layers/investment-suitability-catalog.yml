## Layer Detail

### 1. Road Network Distance
| Attribute | Value |
|-----------|-------|
| Type | Vector (LineString network) |
| Purpose | Proximity to national road network |
| Current Data | 20 toll road centerline points (existing) |
| Gap | Need full road network, not just toll endpoints |
| Open Data Source | OpenStreetMap (OSM) — `highway=motorway,trunk,primary` |
| Alternative | Bina Marga PUPR — shapefile jalan nasional |
| Acquisition | Overpass API query or GeoFabrik Indonesia extract |
| Suitability Rule | Lower distance = higher score (exponential decay) |
| Preprocessing | Calculate distance from project/zone centroid to nearest road |

### 2. Port Distance
| Attribute | Value |
|-----------|-------|
| Type | Vector (Point) |
| Purpose | Proximity to sea port for export-oriented projects |
| Current Data | 30 ports with lat/lng (existing) |
| Source | Pelindo + BIG Satu Peta |
| Suitability Rule | Lower distance = higher score |
| Preprocessing | Haversine distance from project to nearest port |

### 3. Airport Distance
| Attribute | Value |
|-----------|-------|
| Type | Vector (Point) |
| Purpose | Proximity to airport for logistics and accessibility |
| Current Data | 22 airports with lat/lng (existing) |
| Source | Kemenhub + BIG |
| Suitability Rule | Lower distance = higher score |

### 4. Industrial Zone Proximity
| Attribute | Value |
|-----------|-------|
| Type | Vector (Polygon) |
| Purpose | Proximity to existing industrial zones (agglomeration benefit) |
| Current Data | 153 KI polygons (Kemenperin) + 20 KEK points |
| Source | Kemenperin + Dewan KEK |
| Suitability Rule | Inside KI = 100, <5km = 80, <10km = 60, <25km = 40, >25km = 20 |
| Preprocessing | Point-in-polygon + nearest zone centroid distance |

### 5. Land Use / Land Cover
| Attribute | Value |
|-----------|-------|
| Type | Raster 30m or Vector |
| Purpose | Avoid protected/natural land; prefer industrial/ vacant land |
| Open Data | BIG — Peta Rupa Bumi Indonesia (RBI) |
| Alternative | ESA WorldCover (10m, global, free) — esaworldcover.esa.int |
| Suitability Classes | Built-up = 100, Cropland = 70, Grassland = 50, Forest = 20, Water = 0 |
| Constraint | Protected forest = exclusion zone |

### 6. Slope / Elevation
| Attribute | Value |
|-----------|-------|
| Type | Raster 30m (DEM) |
| Purpose | Avoid steep slopes for construction cost |
| Open Data | NASA SRTM 30m — earthexplorer.usgs.gov |
| Alternative | ALOS World 3D 30m — JAXA |
| Suitability Rule | Flat (0-2%) = 100, Gentle (2-8%) = 80, Moderate (8-15%) = 50, Steep (>15%) = 0 |
| Preprocessing | Calculate slope from DEM, resample to province-level average |

### 7. Flood Risk
| Attribute | Value |
|-----------|-------|
| Type | Vector (Polygon) or Raster |
| Purpose | Avoid flood-prone areas |
| Open Data | BNPB — Peta Risiko Bencana Indonesia |
| Alternative | BIG — layer banjir |
| Suitability Rule | Low risk = 100, Medium = 60, High = 0 |
| Constraint | High flood risk = exclusion zone |

### 8. Utility Infrastructure
| Attribute | Value |
|-----------|-------|
| Type | Vector (Point/Polygon) |
| Purpose | Availability of electricity, water, telecom |
| Electricity | PLN — data pembangkit & jaringan (terbatas) |
| Water | PDAM per provinsi (tidak terpusat) |
| Internet | Kominfo — BTS/tower data (terbatas) |
