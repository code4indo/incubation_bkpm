## Weighted Overlay Formula

```
Suitability Score = Σ (Layer_i × Weight_i) × Constraint_Multiplier

Where:
  Layer_i = normalized score 0-100 for each layer
  Weight_i = layer weight (must sum to 100% for opportunity layers)
  Constraint_Multiplier = 0 if any constraint violated, 1 otherwise
```

### Opportunity Weights (sum to 100%)

| Category | Layers | Total Weight |
|----------|--------|-------------|
| Spatial/Physical | Road, Port, Airport, KI, Land Cover, Slope, Flood | 64% |
| Socio-Economic | Pop Density, Workforce, UMR, Education, Economy | 34% |
| PIR-Specific | Investment Realization, Project Density, Sector Spec, Commodity | 18% |

### Constraint Weights (binary: 0 or 1)

| Constraint | Effect |
|------------|--------|
| Outside RTRW zone | Multiplier = 0 (exclusion) |
| Inside protected area | Multiplier = 0 (exclusion) |
| Primary forest conversion | Multiplier = 0 (exclusion) |
| Mining concession overlap | Multiplier = 0 (exclusion) |
| High flood risk | Multiplier = 0 (exclusion) |

### Sector-Specific Weight Adjustments

| Sector | Adjusted Weights |
|--------|-----------------|
| Export Manufacturing | Port ↑ +20%, UMR ↑ +10% |
| Domestic Market | Pop Density ↑ +20%, Workforce ↑ +10% |
| Mining | Mining Concession check, Slope ↓ -10% |
| Tourism | Airport ↑ +15%, Protected Area constraint relax |
| Agroindustry | Commodity ↑ +25%, Land Cover (cropland) ↑ +15% |
| Digital | Education ↑ +20%, Internet ↑ +15% |

